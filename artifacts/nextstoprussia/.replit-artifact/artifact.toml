kind = "web"
previewPath = "/"
title = "NextStopRussia"
version = "1.0.0"
id = "artifacts/nextstoprussia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19774
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/nextstoprussia run dev"

[services.env]
PORT = "19774"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/nextstoprussia", "run", "build"]
publicDir = "artifacts/nextstoprussia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
