version: "3.9"

services:
  nextstoprussia:
    build:
      context: ..
      dockerfile: Dockerfile
    image: nextstoprussia:latest
    container_name: nextstoprussia
    restart: unless-stopped
    ports:
      - "80:80"
    env_file:
      - .env
    volumes:
      # Persistent data: JSON content files + leads CSV + admin credentials
      - nsr_data:/app/artifacts/api-server/data
      # Persistent uploads: images uploaded via admin panel
      - nsr_uploads:/app/artifacts/nextstoprussia/public/images/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/data/services"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  nsr_data:
    driver: local
  nsr_uploads:
    driver: local
